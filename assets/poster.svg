<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-labelledby="title desc">
  <title id="title">Key-Value Storage Engine Poster</title>
  <desc id="desc">A poster illustrating a key-value storage engine with client requests flowing through an HTTP API to an in-memory store, protected by a mutex and surfaced with latency metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
    <style>
      .title { font: 700 76px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; letter-spacing: -1.8px; }
      .subtitle { font: 500 28px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #cbd5e1; }
      .label { font: 700 30px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #e2e8f0; }
      .small { font: 500 22px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #94a3b8; }
      .mono { font: 600 22px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; fill: #cbd5e1; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="150" r="220" fill="#1d4ed8" opacity="0.18"/>
  <circle cx="260" cy="780" r="260" fill="#22c55e" opacity="0.12"/>
  <path d="M0 140 C220 90, 390 100, 560 150 S920 220, 1110 150 S1420 60, 1600 120" fill="none" stroke="#38bdf8" stroke-opacity="0.16" stroke-width="3"/>
  <path d="M0 760 C190 690, 420 700, 590 760 S950 840, 1160 760 S1420 650, 1600 710" fill="none" stroke="#22c55e" stroke-opacity="0.12" stroke-width="3"/>

  <text x="110" y="150" class="title">Key-Value Storage Engine</text>
  <text x="110" y="202" class="subtitle">Fast reads, safe writes, and latency metrics — built from scratch in Go.</text>

  <g filter="url(#shadow)">
    <rect x="110" y="290" rx="28" ry="28" width="310" height="290" fill="#0b1220" stroke="#1e293b" stroke-width="2"/>
    <rect x="460" y="250" rx="34" ry="34" width="420" height="370" fill="#0f172a" stroke="#334155" stroke-width="2"/>
    <rect x="920" y="250" rx="34" ry="34" width="560" height="370" fill="#0b1220" stroke="#334155" stroke-width="2"/>
  </g>

  <text x="170" y="360" class="label">Client</text>
  <text x="170" y="408" class="small">PUT /kv/hello</text>
  <rect x="160" y="455" rx="18" ry="18" width="220" height="56" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
  <text x="270" y="491" text-anchor="middle" class="mono">hello → world</text>
  <text x="170" y="545" class="small">curl, tests, custom tools</text>

  <text x="525" y="330" class="label">HTTP API</text>
  <text x="525" y="378" class="small">Routes requests to the store and exposes metrics.</text>
  <rect x="505" y="430" rx="20" ry="20" width="330" height="62" fill="#111827" stroke="#22c55e" stroke-width="2"/>
  <text x="670" y="469" text-anchor="middle" class="mono">GET /kv/{key}</text>
  <rect x="505" y="510" rx="20" ry="20" width="330" height="62" fill="#111827" stroke="#22c55e" stroke-width="2"/>
  <text x="670" y="549" text-anchor="middle" class="mono">POST /kv/{key}</text>

  <text x="985" y="330" class="label">Store Core</text>
  <text x="985" y="378" class="small">In-memory data, concurrency control, and latency tracking.</text>

  <g transform="translate(980 430)">
    <rect x="0" y="0" rx="24" ry="24" width="250" height="118" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
    <text x="125" y="42" text-anchor="middle" class="mono">In-Memory Map</text>
    <text x="125" y="78" text-anchor="middle" class="small">fast key lookup</text>
  </g>
  <g transform="translate(1260 430)">
    <rect x="0" y="0" rx="24" ry="24" width="190" height="118" fill="#111827" stroke="#22c55e" stroke-width="2"/>
    <text x="95" y="42" text-anchor="middle" class="mono">Mutex</text>
    <text x="95" y="78" text-anchor="middle" class="small">safe writes</text>
  </g>

  <g transform="translate(980 580)">
    <rect x="0" y="0" rx="24" ry="24" width="470" height="34" fill="url(#accent)" opacity="0.35"/>
    <text x="0" y="-18" class="small">Latency metrics</text>
    <path d="M20 24 L80 18 L120 22 L170 8 L230 20 L280 11 L340 16 L400 7 L450 13" fill="none" stroke="#38bdf8" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="80" cy="18" r="6" fill="#38bdf8"/>
    <circle cx="170" cy="8" r="6" fill="#38bdf8"/>
    <circle cx="280" cy="11" r="6" fill="#38bdf8"/>
    <circle cx="400" cy="7" r="6" fill="#38bdf8"/>
  </g>

  <g stroke="#64748b" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M420 435 L460 435"/>
    <path d="M880 435 L920 435"/>
  </g>
  <g fill="#94a3b8">
    <path d="M450 435 l-18 -10 v20 z"/>
    <path d="M910 435 l-18 -10 v20 z"/>
  </g>

  <g>
    <rect x="110" y="635" rx="22" ry="22" width="1370" height="120" fill="#0b1220" stroke="#1e293b" stroke-width="2"/>
    <text x="150" y="690" class="label">What this engine emphasizes</text>
    <text x="150" y="734" class="small">Simple architecture • deterministic behavior • concurrency safety • measurable performance</text>
  </g>
</svg>
